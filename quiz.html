<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>🎵 Music Quiz</title>
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Noto+Sans+KR:wght@300;400;500;700&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #07070f;
      --surface: #11111c;
      --surface2: #181826;
      --border: #25253a;
      --accent: #f0c040;
      --accent2: #e05a5a;
      --success: #40c888;
      --text: #eeeef8;
      --muted: #5a5a7a;
    }

    body {
      font-family: 'Noto Sans KR', sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      overflow: hidden;
    }

    /* ── 배경 파티클 효과 ── */
    .bg-dots {
      position: fixed; inset: 0; z-index: 0;
      background-image: radial-gradient(circle, #ffffff08 1px, transparent 1px);
      background-size: 40px 40px;
      pointer-events: none;
    }

    /* ════════════════════════════════════
       SCREEN: 문제 목록
    ════════════════════════════════════ */
    #screenList {
      position: fixed; inset: 0; z-index: 10;
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      padding: 40px;
    }

    .list-title {
      font-family: 'Bebas Neue', sans-serif;
      font-size: clamp(32px, 5vw, 64px);
      letter-spacing: 8px;
      color: var(--accent);
      margin-bottom: 8px;
      text-align: center;
    }
    .list-subtitle {
      font-size: 16px;
      font-weight: 700;
      color: #000;
      letter-spacing: 1px;
      text-transform: none;
      margin-bottom: 48px;
      text-align: center;
      background: var(--accent);
      display: inline-block;
      padding: 12px 24px;
      border-radius: 24px;
      position: relative;
    }
    .list-subtitle::after {
      content: '';
      position: absolute;
      bottom: -12px;
      left: 50%;
      transform: translateX(-50%);
      border-left: 10px solid transparent;
      border-right: 10px solid transparent;
      border-top: 12px solid var(--accent);
    }

    .quiz-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(140px, 1fr));
      gap: 16px;
      width: 100%;
      max-width: 900px;
      max-height: 60vh;
      overflow-y: auto;
    }
    .quiz-grid::-webkit-scrollbar { width: 4px; }
    .quiz-grid::-webkit-scrollbar-track { background: transparent; }
    .quiz-grid::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }

    .quiz-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 14px;
      padding: 24px 16px;
      text-align: center;
      cursor: pointer;
      transition: all .25s cubic-bezier(.34,1.56,.64,1);
      position: relative;
      overflow: hidden;
    }
    .quiz-card::before {
      content: '';
      position: absolute; inset: 0;
      background: radial-gradient(circle at 50% 0%, rgba(240,192,64,.12), transparent 70%);
      opacity: 0; transition: opacity .3s;
    }
    .quiz-card:hover { transform: translateY(-4px) scale(1.03); border-color: var(--accent); }
    .quiz-card:hover::before { opacity: 1; }
    .quiz-card.done { opacity: .35; pointer-events: none; }
    .quiz-card.done::after {
      content: '✔'; position: absolute; inset: 0;
      display: flex; align-items: center; justify-content: center;
      font-size: 28px; background: rgba(7,7,15,.7);
    }

    .card-num {
      font-family: 'Bebas Neue', sans-serif;
      font-size: 52px;
      line-height: 1;
      color: var(--accent);
    }
    .card-label {
      font-size: 11px;
      color: var(--muted);
      letter-spacing: 1px;
      text-transform: uppercase;
      margin-top: 6px;
    }

    /* ── 떠다니는 말풍선 ── */
    .float-bubble {
      position: fixed;
      pointer-events: none;
      z-index: 5;
      animation: floatUp linear forwards;
      white-space: nowrap;
    }
    .float-bubble.is-text {
      background: var(--surface);
      border: 2px solid var(--accent);
      color: var(--accent);
      font-family: 'Noto Sans KR', sans-serif;
      font-weight: 700;
      font-size: clamp(16px, 2.5vw, 26px);
      padding: 10px 20px;
      border-radius: 30px;
      position: fixed;
    }
    .float-bubble.is-text::after {
      content: '';
      position: absolute;
      bottom: -10px;
      left: 20px;
      border-left: 8px solid transparent;
      border-right: 8px solid transparent;
      border-top: 10px solid var(--accent);
    }
    .float-bubble.is-emoji {
      font-size: clamp(28px, 4vw, 52px);
    }
    @keyframes floatUp {
      0%   { opacity: 0;   transform: translateY(0) scale(.8) rotate(var(--rot)); }
      10%  { opacity: 1;   transform: translateY(-40px) scale(1) rotate(var(--rot)); }
      80%  { opacity: 1; }
      100% { opacity: 0;   transform: translateY(-220px) scale(.95) rotate(var(--rot2)); }
    }

    /* ════════════════════════════════════
       SCREEN: 퀴즈 진행
    ════════════════════════════════════ */
    #screenQuiz {
      position: fixed; inset: 0; z-index: 10;
      display: none;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 40px;
    }

    /* 문제 번호 배지 */
    .q-badge {
      font-family: 'Bebas Neue', sans-serif;
      font-size: 18px;
      letter-spacing: 3px;
      color: var(--muted);
      margin-bottom: 12px;
    }
    .q-badge span { color: var(--accent); font-size: 28px; }

    .q-difficulty {
      font-size: 22px;
      letter-spacing: 4px;
      margin-bottom: 20px;
      min-height: 28px;
    }

    /* 물음표 비주얼 */
    .q-visual {
      width: 220px; height: 220px;
      border-radius: 50%;
      background: var(--surface);
      border: 2px solid var(--border);
      display: flex; align-items: center; justify-content: center;
      font-size: 100px;
      margin-bottom: 48px;
      position: relative;
      transition: all .5s;
    }
    .q-visual.playing {
      border-color: var(--accent);
      box-shadow: 0 0 60px rgba(240,192,64,.25), 0 0 120px rgba(240,192,64,.1);
      animation: pulse 1.5s ease-in-out infinite;
    }
    @keyframes pulse {
      0%, 100% { box-shadow: 0 0 60px rgba(240,192,64,.25), 0 0 120px rgba(240,192,64,.1); }
      50%       { box-shadow: 0 0 80px rgba(240,192,64,.4),  0 0 160px rgba(240,192,64,.15); }
    }

    /* 버튼 그룹 */
    .btn-group {
      display: flex; gap: 20px; align-items: center; flex-wrap: wrap; justify-content: center;
    }

    .btn-play {
      background: var(--accent);
      color: #000;
      border: none;
      border-radius: 60px;
      padding: 20px 48px;
      font-family: 'Bebas Neue', sans-serif;
      font-size: 26px;
      letter-spacing: 3px;
      cursor: pointer;
      transition: all .2s;
      display: flex; align-items: center; gap: 12px;
    }
    .btn-play:hover { background: #ffd060; transform: scale(1.04); }
    .btn-play:active { transform: scale(.97); }
    .btn-play.playing {
      background: var(--surface2);
      color: var(--accent);
      border: 2px solid var(--accent);
    }

    .btn-reveal {
      background: transparent;
      color: var(--success);
      border: 2px solid var(--success);
      border-radius: 60px;
      padding: 18px 40px;
      font-family: 'Bebas Neue', sans-serif;
      font-size: 22px;
      letter-spacing: 3px;
      cursor: pointer;
      transition: all .2s;
    }
    .btn-reveal:hover {
      background: var(--success);
      color: #000;
      transform: scale(1.04);
    }

    .btn-back {
      background: transparent;
      color: var(--muted);
      border: 1px solid var(--border);
      border-radius: 60px;
      padding: 14px 28px;
      font-family: 'Noto Sans KR', sans-serif;
      font-size: 13px;
      cursor: pointer;
      transition: all .2s;
      margin-top: 32px;
    }
    .btn-back:hover { color: var(--text); border-color: var(--muted); }

    /* ════════════════════════════════════
       SCREEN: 정답 공개
    ════════════════════════════════════ */
    #screenAnswer {
      position: fixed; inset: 0; z-index: 10;
      display: none;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 40px;
      overflow-y: auto;
    }

    /* 정답 텍스트 등장 애니메이션 */
    @keyframes revealIn {
      from { opacity: 0; transform: scale(.8) translateY(20px); }
      to   { opacity: 1; transform: scale(1) translateY(0); }
    }
    @keyframes glowPulse {
      0%, 100% { text-shadow: 0 0 40px rgba(240,192,64,.6); }
      50%       { text-shadow: 0 0 80px rgba(240,192,64,.9), 0 0 120px rgba(240,192,64,.4); }
    }

    .answer-label {
      font-size: 14px;
      letter-spacing: 4px;
      color: var(--muted);
      text-transform: uppercase;
      margin-bottom: 16px;
      animation: revealIn .6s ease both;
    }
    .answer-text {
      font-family: 'Bebas Neue', sans-serif;
      font-size: clamp(40px, 7vw, 88px);
      letter-spacing: 4px;
      color: var(--accent);
      text-align: center;
      animation: revealIn .6s .1s ease both, glowPulse 2s 1s ease-in-out infinite;
      margin-bottom: 40px;
      line-height: 1.1;
    }

    /* 정답 음악 플레이어 */
    .answer-player {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 20px;
      padding: 24px 32px;
      display: flex;
      align-items: center;
      gap: 24px;
      animation: revealIn .6s .25s ease both;
      margin-bottom: 32px;
      min-width: 360px;
    }
    .player-icon {
      width: 56px; height: 56px;
      background: var(--accent);
      border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      font-size: 22px;
      flex-shrink: 0;
      cursor: pointer;
      transition: all .2s;
    }
    .player-icon:hover { transform: scale(1.1); }
    .player-info { flex: 1; }
    .player-title { font-size: 15px; font-weight: 500; margin-bottom: 8px; }
    .player-progress {
      width: 100%;
      height: 4px;
      background: var(--border);
      border-radius: 2px;
      cursor: pointer;
      position: relative;
    }
    .player-progress-fill {
      height: 100%;
      background: var(--accent);
      border-radius: 2px;
      width: 0%;
      transition: width .5s linear;
      pointer-events: none;
    }
    .player-time {
      font-size: 11px;
      color: var(--muted);
      margin-top: 6px;
      text-align: right;
    }

    /* 가사 박스 */
    .lyrics-box {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 28px 36px;
      max-width: 700px;
      width: 100%;
      max-height: 300px;
      overflow-y: auto;
      animation: revealIn .6s .35s ease both;
      margin-bottom: 32px;
    }
    .lyrics-box::-webkit-scrollbar { width: 4px; }
    .lyrics-box::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }
    .lyrics-label {
      font-size: 11px;
      letter-spacing: 2px;
      color: var(--muted);
      text-transform: uppercase;
      margin-bottom: 14px;
    }
    .lyrics-text {
      font-size: 16px;
      line-height: 2;
      color: var(--text);
      white-space: pre-wrap;
    }

    .btn-next {
      background: var(--surface2);
      color: var(--text);
      border: 1px solid var(--border);
      border-radius: 60px;
      padding: 16px 40px;
      font-family: 'Bebas Neue', sans-serif;
      font-size: 20px;
      letter-spacing: 3px;
      cursor: pointer;
      transition: all .2s;
      animation: revealIn .6s .45s ease both;
    }
    .btn-next:hover { border-color: var(--accent); color: var(--accent); transform: scale(1.03); }

    /* ── 로딩 오버레이 ── */
    #loadingOverlay {
      position: fixed; inset: 0; z-index: 99;
      background: var(--bg);
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      gap: 20px;
      transition: opacity .5s;
    }
    .loading-logo {
      font-family: 'Bebas Neue', sans-serif;
      font-size: 52px;
      letter-spacing: 8px;
      color: var(--accent);
    }
    .loading-bar-wrap {
      width: 200px; height: 3px;
      background: var(--border);
      border-radius: 2px;
      overflow: hidden;
    }
    .loading-bar {
      height: 100%;
      background: var(--accent);
      border-radius: 2px;
      animation: loadAnim 1.2s ease-in-out infinite;
    }
    @keyframes loadAnim {
      0%   { width: 0%;   margin-left: 0%; }
      50%  { width: 60%;  margin-left: 20%; }
      100% { width: 0%;   margin-left: 100%; }
    }
    .loading-text { font-size: 13px; color: var(--muted); letter-spacing: 2px; }

    /* ── 에러 화면 ── */
    #errorScreen {
      display: none;
      position: fixed; inset: 0; z-index: 20;
      align-items: center; justify-content: center;
      flex-direction: column; gap: 16px; text-align: center;
    }
    #errorScreen .icon { font-size: 48px; }
    #errorScreen p { color: var(--muted); font-size: 15px; }

    /* ── confetti effect ── */
    .confetti-piece {
      position: fixed;
      width: 10px; height: 10px;
      border-radius: 2px;
      animation: confettiFall linear forwards;
      pointer-events: none;
      z-index: 50;
    }
    @keyframes confettiFall {
      0%   { transform: translateY(-20px) rotate(0deg); opacity: 1; }
      100% { transform: translateY(110vh) rotate(720deg); opacity: 0; }
    }
  </style>
</head>
<body>
<div class="bg-dots"></div>

<!-- 로딩 -->
<div id="loadingOverlay">
  <div class="loading-logo">찬양퀴즈 👂</div>
  <div class="loading-bar-wrap"><div class="loading-bar"></div></div>
  <div class="loading-text">퀴즈 불러오는 중...</div>
</div>

<!-- 에러 -->
<div id="errorScreen">
  <div class="icon">😵</div>
  <p id="errorMsg">데이터를 불러올 수 없습니다.</p>
  <button class="btn-back" onclick="location.reload()">다시 시도</button>
</div>

<!-- ① 문제 목록 화면 -->
<div id="screenList">
  <div class="list-title">🎵 들리는데 안들리는<br>알다가도 모를 찬양퀴즈!</div>
  <div class="list-subtitle">들리는데 모르겠쥬? 했갈리쥬? 👂</div>
  <div class="quiz-grid" id="quizGrid"></div>
</div>

<!-- ② 퀴즈 진행 화면 -->
<div id="screenQuiz">
  <div class="q-badge">QUESTION <span id="qNum">1</span></div>
  <div class="q-difficulty" id="qDifficulty"></div>
  <div class="q-visual" id="qVisual">🎵</div>
  <div class="btn-group">
    <button class="btn-play" id="btnPlay" onclick="toggleHint()">
      <span id="playIcon">▶</span>
      <span id="playLabel">노래 듣기</span>
    </button>
    <button class="btn-reveal" onclick="revealAnswer()">✅ 정답 공개</button>
  </div>
  <button class="btn-back" onclick="goList()">← 목록으로</button>
</div>

<!-- ③ 정답 공개 화면 -->
<div id="screenAnswer">
  <div class="answer-label">정답은...</div>
  <div class="answer-text" id="answerText"></div>

  <div class="answer-player" id="answerPlayer">
    <div class="player-icon" id="playerIcon" onclick="toggleAnswer()">▶</div>
    <div class="player-info">
      <div class="player-title" id="playerTitle"></div>
      <div class="player-progress" id="playerProgress" onclick="seekAudio(event)">
        <div class="player-progress-fill" id="progressFill"></div>
      </div>
      <div class="player-time" id="playerTime">0:00 / 0:00</div>
    </div>
  </div>

  <div class="lyrics-box" id="lyricsBox" style="display:none">
    <div class="lyrics-label">🎶 가사</div>
    <div class="lyrics-text" id="lyricsText"></div>
  </div>

  <button class="btn-next" onclick="goList()">다음 문제 →</button>
</div>

<!-- 숨겨진 오디오 요소 -->
<audio id="hintAudio" preload="none"></audio>
<audio id="answerAudio" preload="none"></audio>

<!-- Firebase SDK -->
<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/12.11.0/firebase-app.js";
  import { getFirestore, collection, getDocs, query, orderBy }
    from "https://www.gstatic.com/firebasejs/12.11.0/firebase-firestore.js";

  const firebaseConfig = {
    apiKey: "AIzaSyDr_W2M1tSfSP5YU-KRuekkuWgbT8gZE3A",
    authDomain: "music-quiz-29f1d.firebaseapp.com",
    projectId: "music-quiz-29f1d",
    storageBucket: "music-quiz-29f1d.firebasestorage.app",
    messagingSenderId: "684205843744",
    appId: "1:684205843744:web:8be7328bbfbcf8e034a345"
  };

  const app = initializeApp(firebaseConfig);
  const db  = getFirestore(app);

  try {
    const snap = await getDocs(query(collection(db, 'quizzes'), orderBy('order')));
    const quizzes = [];
    snap.forEach(d => quizzes.push({ id: d.id, ...d.data() }));
    window._quizzes = quizzes;
    window._initQuiz();
  } catch(e) {
    document.getElementById('loadingOverlay').style.display = 'none';
    const err = document.getElementById('errorScreen');
    err.style.display = 'flex';
    document.getElementById('errorMsg').textContent = '데이터 로딩 실패: ' + e.message;
  }
</script>

<script>
  let currentQuiz = null;
  let doneSet = new Set();
  const hintAudio   = document.getElementById('hintAudio');
  const answerAudio = document.getElementById('answerAudio');

  // ── 초기화 ───────────────────────────────────────────────
  window._initQuiz = function() {
    const overlay = document.getElementById('loadingOverlay');
    overlay.style.opacity = '0';
    setTimeout(() => overlay.style.display = 'none', 500);

    renderList();
  };

  // ── 목록 렌더링 ──────────────────────────────────────────
  function renderList() {
    stopAll();
    showScreen('screenList');

    const grid = document.getElementById('quizGrid');
    const quizzes = window._quizzes || [];

    if (!quizzes.length) {
      grid.innerHTML = `<div style="grid-column:1/-1;text-align:center;color:var(--muted);padding:40px">등록된 퀴즈가 없습니다.</div>`;
      return;
    }

    grid.innerHTML = quizzes.map((q, i) => `
      <div class="quiz-card ${doneSet.has(q.id) ? 'done' : ''}"
           onclick="selectQuiz(${i})" style="animation-delay:${i * 0.05}s">
        <div class="card-num">${q.order}</div>
        <div class="card-label">문제</div>
      </div>
    `).join('');
  }
  window.goList = function() { stopBubbles(); renderList(); };

  // ── 문제 선택 ────────────────────────────────────────────
  window.selectQuiz = function(index) {
    currentQuiz = window._quizzes[index];
    stopAll();
    resetPlayBtn();

    document.getElementById('qNum').textContent = currentQuiz.order;

    // 난이도 별점
    const diff = currentQuiz.difficulty || 0;
    const diffEl = document.getElementById('qDifficulty');
    if (diff > 0) {
      diffEl.innerHTML =
        `<span style="color:var(--accent)">${'★'.repeat(diff)}</span><span style="color:var(--border)">${'★'.repeat(5 - diff)}</span>`;
    } else {
      diffEl.innerHTML = '';
    }

    hintAudio.src = currentQuiz.hintUrl;

    showScreen('screenQuiz');
  };

  // ── 떠다니는 말풍선 ─────────────────────────────────────
  const bubbleTexts = ['모르겠쥬?', '했갈리쥬?', '알쏭달쏭?', '뭐였더라...', '음... 🤔', '이거 맞나?'];
  const bubbleEmojis = ['🤔', '😵', '😅', '🙄', '😬', '🫠', '😶', '🤷', '😮', '🫣', '😦', '🤭'];
  let bubbleTimer = null;

  function launchBubble() {
    const isText = Math.random() > 0.45;
    const el = document.createElement('div');
    el.className = 'float-bubble ' + (isText ? 'is-text' : 'is-emoji');

    if (isText) {
      el.textContent = bubbleTexts[Math.floor(Math.random() * bubbleTexts.length)];
    } else {
      el.textContent = bubbleEmojis[Math.floor(Math.random() * bubbleEmojis.length)];
    }

    const rot  = (Math.random() * 16 - 8).toFixed(1) + 'deg';
    const rot2 = (Math.random() * 16 - 8).toFixed(1) + 'deg';
    const duration = 2.8 + Math.random() * 2;
    el.style.cssText += `
      left: ${8 + Math.random() * 80}vw;
      bottom: ${12 + Math.random() * 30}vh;
      --rot: ${rot}; --rot2: ${rot2};
      animation-duration: ${duration}s;
    `;
    document.body.appendChild(el);
    setTimeout(() => el.remove(), duration * 1000);
  }

  function startBubbles() {
    launchBubble();
    bubbleTimer = setInterval(() => launchBubble(), 900);
  }
  function stopBubbles() {
    clearInterval(bubbleTimer);
    bubbleTimer = null;
    document.querySelectorAll('.float-bubble').forEach(b => b.remove());
  }

  // ── 힌트 음원 재생/정지 ──────────────────────────────────
  window.toggleHint = function() {
    if (hintAudio.paused) {
      hintAudio.play();
      document.getElementById('qVisual').classList.add('playing');
      document.getElementById('qVisual').textContent = '🎵';
      document.getElementById('playIcon').textContent = '⏸';
      document.getElementById('playLabel').textContent = '일시정지';
      document.getElementById('btnPlay').classList.add('playing');
      startBubbles();
    } else {
      hintAudio.pause();
      document.getElementById('qVisual').classList.remove('playing');
      document.getElementById('playIcon').textContent = '▶';
      document.getElementById('playLabel').textContent = '노래 듣기';
      document.getElementById('btnPlay').classList.remove('playing');
      stopBubbles();
    }
  };

  hintAudio.addEventListener('ended', () => { resetPlayBtn(); stopBubbles(); });

  function resetPlayBtn() {
    document.getElementById('qVisual').classList.remove('playing');
    document.getElementById('playIcon').textContent = '▶';
    document.getElementById('playLabel').textContent = '노래 듣기';
    document.getElementById('btnPlay').classList.remove('playing');
  }

  // ── 정답 공개 ────────────────────────────────────────────
  window.revealAnswer = function() {
    if (!currentQuiz) return;
    stopAll();
    stopBubbles();
    doneSet.add(currentQuiz.id);

    // 정답 텍스트
    document.getElementById('answerText').textContent = currentQuiz.answer;
    document.getElementById('playerTitle').textContent = currentQuiz.answer;

    // 정답 음원
    answerAudio.src = currentQuiz.answerUrl;
    answerAudio.play();
    document.getElementById('playerIcon').textContent = '⏸';

    // 가사
    const lb = document.getElementById('lyricsBox');
    if (currentQuiz.lyrics) {
      document.getElementById('lyricsText').textContent = currentQuiz.lyrics;
      lb.style.display = 'block';
    } else {
      lb.style.display = 'none';
    }

    showScreen('screenAnswer');
    launchConfetti();
  };

  // ── 정답 음원 플레이어 ───────────────────────────────────
  window.toggleAnswer = function() {
    if (answerAudio.paused) {
      answerAudio.play();
      document.getElementById('playerIcon').textContent = '⏸';
    } else {
      answerAudio.pause();
      document.getElementById('playerIcon').textContent = '▶';
    }
  };

  answerAudio.addEventListener('timeupdate', () => {
    if (!answerAudio.duration) return;
    const pct = (answerAudio.currentTime / answerAudio.duration) * 100;
    document.getElementById('progressFill').style.width = pct + '%';
    document.getElementById('playerTime').textContent =
      fmtTime(answerAudio.currentTime) + ' / ' + fmtTime(answerAudio.duration);
  });
  answerAudio.addEventListener('ended', () => {
    document.getElementById('playerIcon').textContent = '▶';
    document.getElementById('progressFill').style.width = '100%';
  });

  window.seekAudio = function(e) {
    if (!answerAudio.duration) return;
    const rect = document.getElementById('playerProgress').getBoundingClientRect();
    const pct = (e.clientX - rect.left) / rect.width;
    answerAudio.currentTime = pct * answerAudio.duration;
  };

  function fmtTime(s) {
    const m = Math.floor(s / 60);
    const sec = Math.floor(s % 60).toString().padStart(2, '0');
    return `${m}:${sec}`;
  }

  // ── 전체 정지 ────────────────────────────────────────────
  function stopAll() {
    hintAudio.pause();
    hintAudio.currentTime = 0;
    answerAudio.pause();
    answerAudio.currentTime = 0;
    document.getElementById('progressFill').style.width = '0%';
    document.getElementById('playerIcon').textContent = '▶';
  }

  // ── 화면 전환 ────────────────────────────────────────────
  function showScreen(id) {
    ['screenList','screenQuiz','screenAnswer'].forEach(s => {
      const el = document.getElementById(s);
      el.style.display = 'none';
    });
    const target = document.getElementById(id);
    target.style.display = 'flex';
    target.style.opacity = '0';
    target.style.transform = 'scale(.97)';
    target.style.transition = 'opacity .35s, transform .35s';
    requestAnimationFrame(() => {
      requestAnimationFrame(() => {
        target.style.opacity = '1';
        target.style.transform = 'scale(1)';
      });
    });
  }

  // ── 색종이 효과 ──────────────────────────────────────────
  function launchConfetti() {
    const colors = ['#f0c040','#e05a5a','#40c888','#5a9ef0','#c05af0','#f07a40'];
    for (let i = 0; i < 60; i++) {
      const el = document.createElement('div');
      el.className = 'confetti-piece';
      el.style.cssText = `
        left: ${Math.random() * 100}vw;
        top: -10px;
        background: ${colors[Math.floor(Math.random() * colors.length)]};
        width: ${6 + Math.random() * 10}px;
        height: ${6 + Math.random() * 10}px;
        border-radius: ${Math.random() > .5 ? '50%' : '2px'};
        animation-duration: ${2 + Math.random() * 2}s;
        animation-delay: ${Math.random() * .5}s;
      `;
      document.body.appendChild(el);
      setTimeout(() => el.remove(), 5000);
    }
  }
</script>
</body>
</html>
